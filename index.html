<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Magic — Creative Apps for iOS</title>
    <meta name="description" content="Tap Magic builds fun, beautifully crafted iOS apps. HeartSync — discover your heart connection.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0D0D12;
            min-height: 100vh;
            color: #F0F0F5;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            position: relative;
            padding: 80px 24px 60px;
            text-align: center;
            background: radial-gradient(ellipse at 50% 0%, rgba(255,107,138,0.15) 0%, transparent 70%);
        }
        .hero-glow {
            position: absolute;
            top: -120px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 400px;
            background: radial-gradient(circle, rgba(255,107,138,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .brand { position: relative; z-index: 1; }
        .brand-icon { font-size: 28px; margin-bottom: 12px; opacity: 0.9; }
        .brand h1 {
            font-size: 40px; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FF6B8A 0%, #FF8FA8 50%, #FFB5C5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .brand .tagline {
            font-size: 16px; color: #9B9BAF; font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* ECG Line Divider */
        .ecg-divider {
            position: relative; height: 60px; margin: 20px 0 0;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .ecg-line {
            width: 320px; height: 60px;
        }
        .ecg-path {
            stroke: #FF6B8A; stroke-width: 2; fill: none;
            stroke-dasharray: 800; stroke-dashoffset: 800;
            animation: drawECG 2.5s ease-out forwards;
            filter: drop-shadow(0 0 6px rgba(255,107,138,0.4));
        }
        @keyframes drawECG {
            to { stroke-dashoffset: 0; }
        }

        /* Featured App */
        .featured {
            max-width: 480px; margin: 0 auto;
            padding: 0 24px 60px;
            text-align: center;
        }
        .featured-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,107,138,0.15);
            border-radius: 24px;
            padding: 40px 32px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }
        .featured-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,107,138,0.3), transparent);
        }
        .featured-badge {
            display: inline-block;
            background: rgba(255,107,138,0.12);
            color: #FF8FA8;
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.5px;
            padding: 6px 16px; border-radius: 20px;
            margin-bottom: 24px;
        }
        .app-icon-large {
            width: 96px; height: 96px;
            background: linear-gradient(145deg, #FF6B8A, #E8456A);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(255,107,138,0.3), 0 2px 8px rgba(0,0,0,0.3);
        }
        .featured h2 {
            font-size: 28px; font-weight: 700;
            color: #FFFFFF; margin-bottom: 8px;
        }
        .featured .app-tagline {
            font-size: 15px; color: #9B9BAF; line-height: 1.5;
            margin-bottom: 28px; max-width: 320px; margin-left: auto; margin-right: auto;
        }

        /* App Store Button */
        .app-store-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: #FFFFFF;
            color: #0D0D12;
            padding: 14px 28px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 16px; font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .app-store-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
        }
        .app-store-btn svg { width: 22px; height: 22px; }

        /* ECG Accent Line (subtle) */
        .ecg-accent {
            display: flex; align-items: center; gap: 8px;
            justify-content: center;
            margin-top: 24px; opacity: 0.4;
        }
        .ecg-accent .dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: #FF6B8A;
        }
        .ecg-accent .line {
            width: 40px; height: 1px; background: #FF6B8A;
        }

        /* Footer */
        .footer {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 28px 24px;
            text-align: center;
        }
        .footer-links { margin-bottom: 12px; }
        .footer-links a {
            color: #6B6B80; text-decoration: none;
            font-size: 13px; margin: 0 12px;
            transition: color 0.2s;
        }
        .footer-links a:hover { color: #FF8FA8; }
        .footer .copyright {
            font-size: 12px; color: #4A4A5A;
        }
        .footer .copyright a { color: #6B6B80; text-decoration: none; }
    </style>
</head>
<body>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-glow"></div>
        <div class="brand">
            <div class="brand-icon">✨</div>
            <h1>Tap Magic</h1>
            <p class="tagline">Apps built with love, powered by real hardware</p>
        </div>

        <!-- Animated ECG Line -->
        <div class="ecg-divider">
            <svg class="ecg-line" viewBox="0 0 320 60" preserveAspectRatio="none">
                <path class="ecg-path" d="M0,30 L80,30 L100,30 L110,30 L120,8 L130,52 L140,20 L148,30 L160,30 L240,30 L260,30 L270,30 L280,8 L290,52 L300,20 L308,30 L320,30" />
            </svg>
        </div>
    </section>

    <!-- Featured App: HeartSync -->
    <section class="featured">
        <div class="featured-card">
            <div class="featured-badge">Available Now</div>
            <div class="app-icon-large">💗</div>
            <h2>HeartSync</h2>
            <p class="app-tagline">Discover your heart connection. Measure heart rates together and reveal your compatibility score.</p>
            <a href="https://apps.apple.com/app/heartsync" class="app-store-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                </svg>
                Download on the App Store
            </a>
            <div class="ecg-accent">
                <span class="line"></span>
                <span class="dot"></span>
                <span class="line"></span>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
            <a href="/support">Support</a>
        </div>
        <div class="copyright">
            <p>&copy; 2026 Tap Magic &middot; <a href="mailto:support@tapmagic.tech">support@tapmagic.tech</a></p>
        </div>
    </footer>

</body>
</html>
